# ================================================================
# Tools
# ================================================================
[tools]

# Markdown
markdownlint-cli2 = "latest"

# GitHub Actions
actionlint = "latest"
shellcheck = "latest"

# Other tools
lefthook = "latest"
cspell = "latest"
watchexec = "latest"


# ================================================================
# Environment Variables
# ================================================================
[env]
CORS_ALLOWED_ORIGINS = "http://localhost:3000"
LOG_FORMAT = "text"
LOG_LEVEL = "debug"
PORT = "8080"


# ================================================================
# Tasks
# See: https://mise.jdx.dev/tasks/toml-tasks.html
# ================================================================

# Global
[tasks.setup]
description = "Setup tools"
run = ["mise trust -yq", "mise install", "lefthook install"]
alias = "s"

[tasks.fix]
description = "Fix all issues"
depends = ["md-fix", "rs-fix"]
alias = "f"

[tasks.check]
description = "Check for all issues"
depends = ["md-check", "gh-check", "spell-check", "rs-check"]
alias = "c"

[tasks.fix-and-check]
run = [{ task = "fix" }, { task = "check" }]
description = "Fix all issues and check for issues"
alias = "fc"

# Markdown
[tasks.md-fix]
description = "Fix Markdown issues"
run = "markdownlint-cli2 . --fix"
alias = "mf"

[tasks.md-check]
description = "Check for Markdown issues"
run = "markdownlint-cli2 ."
alias = "mc"

# GitHub Actions
[tasks.gh-check]
description = "Check GitHub Actions workflows"
run = "actionlint .github/workflows/*.yml"
alias = "ghc"

# Spell Check
[tasks.spell-check]
description = "Check spelling"
run = "cspell . --gitignore --verbose"
alias = "sc"

# Rust
[vars]
app_dir = "app"

[tasks.rs-install]
description = "Install Rust dependencies"
run = "cargo fetch"
dir = "{{vars.app_dir}}"

[tasks.rs-fix]
description = "Fix Rust code"
run = [
  "cargo clippy --all-targets --all-features --no-deps --fix --allow-dirty",
  "cargo fmt",
]
alias = "rf"
dir = "{{vars.app_dir}}"

[tasks.rs-check]
description = "Check Rust code"
run = [
  "cargo clippy --all-targets --all-features --no-deps",
  "cargo fmt -- --check",
  "cargo test -- --nocapture",
]
alias = "rc"
dir = "{{vars.app_dir}}"

[tasks.rs-run]
description = "Run Rust application"
run = "cargo run"
alias = "rr"
dir = "{{vars.app_dir}}"

[tasks.rs-watch]
description = "Watch for file changes and reload Rust application"
run = "watchexec --exts rs,toml --restart -- cargo run"
alias = "rw"
dir = "{{vars.app_dir}}"

[tasks.rs-build]
description = "Build Rust application"
run = "cargo build"
dir = "{{vars.app_dir}}"

[tasks.rs-build-release]
description = "Build Rust application in release mode"
run = "cargo build --release"
dir = "{{vars.app_dir}}"

[tasks.rs-clean]
description = "Clean Rust build artifacts"
run = "cargo clean"
dir = "{{vars.app_dir}}"
